<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="sign.css" />
  </head>
  <body>
    <div class="login-form">
      <h1>Register</h1>
      <div class="container">
        <div class="main">
          <div class="content">
            <h2>Register</h2>
            <form>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Email Address"
                required
                autofocus=""
              />
              <input
                type="password"
                id="password"
                name="password"
                placeholder="User Password"
                required
                autofocus=""
              />
              <button id="register" class="btn" type="button">Register</button>
            </form>
            <p class="account">
              Already have an account? <a href="login.html">Sign In</a>
            </p>
          </div>
          <div class="form-img">
            <img src="image/login.jpg" alt="" />
          </div>
        </div>
      </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-auth.js"></script>
    <script>
      // Your Firebase configuration
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "bliss-auth.firebaseapp.com",
        projectId: "bliss-auth",
        storageBucket: "bliss-auth.appspot.com",
        messagingSenderId: "487776642853",
        appId: "1:487776642853:web:25b4821e77c6de7e90dccc",
        measurementId: "G-00FGRRF868",
      };

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();

      // Registration code
      document
        .getElementById("register")
        .addEventListener("click", function () {
          var email = document.getElementById("email").value;
          var password = document.getElementById("password").value;

          // For new registration
          firebase
            .auth()
            .createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
              // Signed in
              const user = userCredential.user;
              console.log(user);
              alert("Registration successfully!!");
            })
            .catch((error) => {
              const errorCode = error.code;
              const errorMessage = error.message;
              console.error(errorMessage);
              alert(errorMessage);
            });
        });
    </script>
  </body>
</html>
